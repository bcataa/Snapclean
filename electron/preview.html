<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SnapClean Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: no-drag;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    user-select: none;
  }

  #root {
    position: fixed;
    inset: 0;
    opacity: 0;
    transform: translateY(12px) scale(0.96);
    transition: opacity 260ms ease, transform 280ms ease;
  }
  #root.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  #card {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(17, 18, 22, 0.74);
    border: 1px solid rgba(255, 255, 255, 0.14);
    box-shadow:
      0 10px 24px rgba(0, 0, 0, 0.22),
      0 22px 45px rgba(0, 0, 0, 0.22),
      0 0 0 1px rgba(255,255,255,0.06) inset;
    backdrop-filter: blur(20px) saturate(175%);
    -webkit-backdrop-filter: blur(20px) saturate(175%);
    transform: translateZ(0);
    transition: transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1), filter 260ms ease;
  }
  #card.expanded {
    transform: scale(1.015) translateY(-2px);
    filter: brightness(1.03);
  }

  #thumb {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    transition: opacity 240ms ease;
  }
  #img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 8px 26px rgba(0,0,0,0.34);
  }

  #editor {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: 10px;
    gap: 8px;
    opacity: 0;
    transition: opacity 220ms ease;
  }
  #editor.visible {
    display: flex;
  }
  #editor.fade-in {
    opacity: 1;
  }
  #editorToolbar {
    height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(14, 16, 20, 0.58);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px;
    gap: 6px;
  }
  .group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tool.active {
    background: rgba(59,130,246,0.3);
    border-color: rgba(59,130,246,0.55);
  }
  #editorStage {
    position: relative;
    flex: 1;
    min-height: 0;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.2);
  }
  #editorCanvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }

  #controls {
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 12px;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;
    transition: opacity 220ms ease, transform 260ms ease;
  }
  #controls.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .btn {
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.9);
    border-radius: 10px;
    padding: 8px;
    min-height: 34px;
    min-width: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 180ms ease, transform 130ms ease, filter 180ms ease, border-color 180ms ease;
  }
  .btn:hover {
    background: rgba(255,255,255,0.18);
    filter: brightness(1.06);
  }
  .btn:active {
    transform: scale(0.96);
  }
  #btnClose {
    background: rgba(239, 68, 68, 0.22);
    border-color: rgba(239,68,68,0.38);
  }
  #btnClose:hover {
    background: rgba(239,68,68,0.34);
  }
  #btnPin.active {
    background: rgba(59,130,246,0.35);
    border-color: rgba(59,130,246,0.6);
    color: #dbeafe;
  }
  .icon {
    width: 15px;
    height: 15px;
    display: block;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .icon-fill {
    fill: currentColor;
    stroke: none;
  }
  .pulse {
    animation: pulse 220ms ease;
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
  <div id="root">
    <div id="card">
      <div id="thumb"><img id="img" alt="Screenshot preview" /></div>
      <div id="editor">
        <div id="editorToolbar">
          <div class="group">
            <button id="toolRect" class="btn tool active" title="Rectangle" aria-label="Rectangle">
              <svg class="icon" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2"></rect></svg>
            </button>
            <button id="toolArrow" class="btn tool" title="Arrow" aria-label="Arrow">
              <svg class="icon" viewBox="0 0 24 24"><path d="M4 12h14"></path><path d="m13 7 5 5-5 5"></path></svg>
            </button>
            <button id="toolText" class="btn tool" title="Text" aria-label="Text">
              <svg class="icon" viewBox="0 0 24 24"><path d="M4 6h16"></path><path d="M12 6v12"></path><path d="M8 18h8"></path></svg>
            </button>
          </div>
          <div class="group">
            <button id="btnDoneEdit" class="btn" title="Done" aria-label="Done">
              <svg class="icon" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"></path></svg>
            </button>
          </div>
        </div>
        <div id="editorStage">
          <canvas id="editorCanvas"></canvas>
        </div>
      </div>
      <div id="controls">
        <button id="btnCopy" class="btn" title="Copy" aria-label="Copy">
          <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M6 15H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path></svg>
        </button>
        <button id="btnSave" class="btn" title="Save" aria-label="Save">
          <svg class="icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path></svg>
        </button>
        <button id="btnEdit" class="btn" title="Edit" aria-label="Edit">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
        </button>
        <button id="btnPin" class="btn" title="Pin" aria-label="Pin">
          <svg class="icon" viewBox="0 0 24 24"><path d="m14 4 6 6"></path><path d="m7 9 8 8"></path><path d="M4 20 10 14"></path><path d="m16 8-7 7"></path></svg>
        </button>
        <button id="btnClose" class="btn" title="Close" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24"><path d="m18 6-12 12"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
    </div>
  </div>
  <script src="./preview.js"></script>
</body>
</html>
